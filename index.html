<html>
<head>
<title>VTU Fun Result Checker</title>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin-top:100px;
}

.box{
background:white;
padding:30px;
width:320px;
margin:auto;
border-radius:10px;
box-shadow:0 0 10px gray;
}

input{
width:90%;
padding:10px;
margin:10px;
}

button{
padding:10px 20px;
background:#003366;
color:white;
border:none;
border-radius:5px;
}

.captcha{
font-size:22px;
font-weight:bold;
letter-spacing:5px;
background:#eee;
display:inline-block;
padding:8px 15px;
margin:10px;
}
</style>
</head>

<body>

<div class="box">
<h2>VTU Result 2026</h2>

<input type="text" placeholder="Enter USN"><br>

<div class="captcha" id="captcha"></div><br>

<input type="text" id="captchaInput" placeholder="Enter Captcha"><br>

<button onclick="checkCaptcha()">Submit</button>

<p id="result"></p>
</div>

<script>

let captchaNumber = Math.floor(1000 + Math.random()*9000);
document.getElementById("captcha").innerText = captchaNumber;

function checkCaptcha(){
let userCaptcha = document.getElementById("captchaInput").value;

if(userCaptcha == captchaNumber){
document.body.innerHTML="<h1 style='color:red;margin-top:200px'>RESULT: FAIL 😂<br>No need to check!</h1>";
}else{
document.getElementById("result").innerText="Wrong captcha. Try again.";
}

}

</script>

</body>
</html>
